<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    
    <!-- Primary Meta Tags -->
    <title>Fashion Retail Platform - Manage Your Fashion Business</title>
    <meta name="title" content="Fashion Retail Platform - Manage Your Fashion Business" />
    <meta name="description" content="Complete platform for fashion retailers in Cameroon. Manage inventory, orders, customers, and WhatsApp communication all in one place." />
    
    <!-- Theme Color - HopeRise Green -->
    <meta name="theme-color" content="#2ECC71" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/styles.css" />
    
    <!-- Styles -->
    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #F5EFE0;
        overflow-x: hidden;
      }
      
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: 100%;
      }
      
      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #F5EFE0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      #loading-screen.hidden {
        display: none;
      }
      
      .loading-logo {
        font-size: 48px;
        font-weight: 900;
        color: #1C1C1C;
        letter-spacing: 2px;
        margin-bottom: 24px;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #E5E5E5;
        border-top-color: #2ECC71;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 24px;
        font-size: 14px;
        font-weight: 600;
        color: #4A4A4A;
        letter-spacing: 0.5px;
      }
      
      /* Responsive adjustments */
      @media (max-width: 768px) {
        .loading-logo {
          font-size: 32px;
        }
      }
      
      /* Prevent text selection on non-text elements */
      button, a {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: #F8F5EE;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #2ECC71;
        border-radius: 6px;
        border: 2px solid #F8F5EE;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #27AE60;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo">Fashion Retail</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading your dashboard...</div>
    </div>
    
    <!-- App Root -->
    <div id="root"></div>
    
    <!-- Hide loading screen after app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
          }
        }, 500);
      });
    </script>
  </body>
</html>
